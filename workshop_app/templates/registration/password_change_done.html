{% extends "workshop_app/base.html" %}

{% block title %} Password Changed - FOSSEE Workshops {% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 w-full max-w-lg mx-auto relative z-10 perspective-[2000px]">
    
    <div class="bg-white p-10 shadow-soft hover:shadow-hover-soft rounded-2xl border border-slate-100 w-full transition-all duration-300 transform hover:-translate-y-1 text-center">
        <!-- Success Graphic -->
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-emerald-100 mb-6 border-4 border-white shadow-sm ring-1 ring-emerald-50">
            <span class="material-icons text-emerald-600 text-4xl">check_circle</span>
        </div>
        
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-4">
            Successfully <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-secondary-600">Updated</span>
        </h2>
        
        <p class="text-slate-500 font-medium mb-8 text-sm">
            Your password has been changed successfully.
        </p>

        <a href="{% url 'workshop_app:index' %}" class="inline-flex justify-center items-center py-3 px-8 rounded-lg shadow-btn text-sm font-bold text-white bg-gradient-to-r from-primary-600 to-secondary-600 hover:from-primary-700 hover:to-secondary-700 transform hover:-translate-y-0.5 transition-all">
            <span class="material-icons text-sm mr-2">arrow_back</span> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
