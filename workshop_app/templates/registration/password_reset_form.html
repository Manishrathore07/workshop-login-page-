{% extends "workshop_app/base.html" %}

{% block title %} Forgot Password - FOSSEE Workshops {% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 w-full max-w-md mx-auto relative z-10 perspective-[2000px]">
    <div class="sm:mx-auto sm:w-full sm:max-w-md mb-8 text-center object-center">
        <h2 class="mt-6 text-center text-4xl font-extrabold text-slate-900 tracking-tight">
            Forgot <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-secondary-600">Password</span>
        </h2>
        <p class="mt-3 text-center mb-6 text-sm text-slate-500 font-medium">
            Enter your registered email address to reset your password.
        </p>
    </div>

    <!-- Elevated Card -->
    <div class="bg-white py-10 px-6 shadow-soft hover:shadow-hover-soft rounded-xl border border-slate-100 sm:px-10 w-full transition-all duration-300 transform hover:-translate-y-1">
        <form action="" method="post" class="space-y-6
            [&_input[type=email]]:appearance-none [&_input[type=email]]:block [&_input[type=email]]:w-full [&_input[type=email]]:px-4 [&_input[type=email]]:py-3 [&_input[type=email]]:border [&_input[type=email]]:border-slate-200 [&_input[type=email]]:rounded-lg [&_input[type=email]]:shadow-sm [&_input[type=email]]:focus:outline-none [&_input[type=email]]:focus:ring-2 [&_input[type=email]]:focus:ring-primary-500 [&_input[type=email]]:focus:border-primary-500 [&_input[type=email]]:transition-all [&_input[type=email]]:duration-200 [&_input[type=email]]:font-medium
            [&_label]:block [&_label]:text-sm [&_label]:font-semibold [&_label]:text-slate-700 [&_label]:mb-1
            [&_.helptext]:block [&_.helptext]:text-xs [&_.helptext]:text-slate-500 [&_.helptext]:mt-2
            [&_.errorlist]:text-red-500 [&_.errorlist]:text-sm [&_.errorlist]:font-medium [&_.errorlist]:mb-2 [&_.errorlist]:list-none [&_.errorlist]:p-0
        ">
            {% csrf_token %}

            <div>
                {{ form.as_p }}
            </div>

            <div class="pt-4 flex flex-col space-y-3">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-btn text-sm font-bold text-white bg-gradient-to-r from-primary-600 to-secondary-600 hover:from-primary-700 hover:to-secondary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transform hover:-translate-y-0.5 transition-all duration-200 tracking-wide">
                    Request Password Reset
                </button>
                <a href="{% url 'workshop_app:index' %}" class="w-full flex justify-center py-3 px-4 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
